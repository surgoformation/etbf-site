backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"

collections:
  - name: "blog"
    label: "Articles"
    folder: "_posts"
    create: true
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Image", name: "thumbnail", widget: "image", required: false}
      - {label: "Contenu", name: "body", widget: "markdown"}
